# argocd/app-staging.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vandimmi/yas
    targetRevision: v1.2.3   # Jenkins sẽ update field này khi có tag mới
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: false  # staging sync thủ công hoặc qua Jenkins