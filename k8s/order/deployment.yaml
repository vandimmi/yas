apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order  
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: vandiemmy/order:main
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"

apiVersion: v1
kind: Service
metadata:
  name: order
spec:
  type: NodePort
  selector:
    app: order
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30086